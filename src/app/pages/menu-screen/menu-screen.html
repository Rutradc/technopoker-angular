<div class="menu-container">
  <h1 class="title">TechnoPoker</h1>

  @if(!connected()) {
    <form [formGroup]="form" class="username-box">
  
      <input
        type="text"
        class="username-input"
        formControlName="username"
        placeholder="Entrez votre pseudo"
      />
  
      <button
        type="button"
        class="btn confirm"
        (click)="confirmUsername()"
        [disabled]="form.invalid"
      >
        Confirmer
      </button>
  
    </form>
  }
  @else {
    <div class="user-row">
      <div class="current-user">
        Joueur connecté : <strong>{{ username() }}</strong>
      </div>

      <button class="btn confirm edit-btn" (click)="editUsername()">
        Modifier
      </button>
    </div>
  }


  <div class="menu">
    <button class="btn primary" [disabled]="!connected()" (click)="createGame()">Créer une partie</button>
    <button class="btn secondary" [disabled]="!connected()" (click)="joinGame()">Rejoindre une partie</button>
  </div>
</div>
