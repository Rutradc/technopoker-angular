@if (summary){
  <div class="game-summary-overlay">
    <div class="game-summary-card">
      <div class="summary-header">
        <div class="summary-title">Fin de partie</div>
        <div class="summary-winner-block">
          <span class="winner-label">Vainqueur</span>
          <span class="winner-name">{{ summary.winner_name || 'Aucun' }}</span>
        </div>
      </div>

      <div class="summary-body">
        <div class="winner-info">
          <div class="winner-chip-row">
            <span class="value-label">Nombre de jetons</span>
            <span class="winner-chips">{{ summary.winner_chips }} jetons</span>
          </div>
        </div>

        <div class="summary-actions">
          <button class="btn leave" (click)="onLeave()">Quitter la table</button>
        </div>
      </div>
    </div>
  </div>
}
