<div class="card {{sizeClass}}"
     [class.facedown]="isFaceDown"
     [class.simple]="isFaceDown && faceDownStyle === 'simple'"
     [class.classic]="isFaceDown && faceDownStyle === 'classic'"
     >

  @if (!isFaceDown) {
    <div class="corner top-left">
      <span class="value">{{valueShowed}}</span>
      <span class="suit">{{suitIcon}}</span>
    </div>

    <div class="center">
      {{suitIcon}}
    </div>

    <div class="corner bottom-right">
      <span class="value">{{valueShowed}}</span>
      <span class="suit">{{suitIcon}}</span>
    </div>
  }

</div>
